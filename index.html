<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jai Club - Join The Winning Circle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
            background: linear-gradient(135deg, #0a0e27 0%, #1a0a3e 50%, #0f0a2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Animated background particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            animation: float 20s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) translateX(0px); opacity: 0.5; }
            50% { transform: translateY(-100px) translateX(50px); opacity: 1; }
        }

        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(40px);
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.2); opacity: 0.6; }
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 600px;
            padding: 40px 20px;
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Logo Container */
        .logo-container {
            position: relative;
            margin-bottom: 30px;
            animation: scaleIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.5) rotateY(90deg);
            }
            to {
                opacity: 1;
                transform: scale(1) rotateY(0deg);
            }
        }

        .logo-glow {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(147, 51, 234, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(50px);
            animation: glowPulse 3s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes glowPulse {
            0%, 100% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.1); }
        }

        .logo-img {
            width: 250px;
            height: auto;
            display: block;
            margin: 0 auto;
            filter: drop-shadow(0 0 30px rgba(147, 51, 234, 0.8))
                    drop-shadow(0 0 60px rgba(139, 92, 246, 0.4));
            animation: logoBounce 2s ease-in-out infinite 0.4s;
            position: relative;
            z-index: 2;
        }

        @keyframes logoBounce {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        /* Text Styles */
        .title {
            font-size: 4.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #00d4ff 0%, #ff00ff 50%, #00d4ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(0, 212, 255, 0.3);
            margin: 20px 0;
            letter-spacing: -2px;
            animation: titleGlow 2s ease-in-out infinite 0.6s;
            text-transform: uppercase;
            font-family: 'Bebas Neue', sans-serif;
        }

        @keyframes titleGlow {
            0%, 100% { 
                text-shadow: 0 0 20px rgba(0, 212, 255, 0.3),
                            0 0 40px rgba(147, 51, 234, 0.2);
                letter-spacing: -2px;
            }
            50% { 
                text-shadow: 0 0 40px rgba(0, 212, 255, 0.6),
                            0 0 80px rgba(147, 51, 234, 0.4);
                letter-spacing: 2px;
            }
        }

        .subtitle {
            font-size: 1.3rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 40px;
            animation: fadeIn 0.8s ease-out 0.8s both;
            font-weight: 300;
            letter-spacing: 1px;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Button Styles */
        .btn-container {
            margin-top: 40px;
            animation: fadeIn 0.8s ease-out 1s both;
        }

        .btn {
            position: relative;
            padding: 18px 50px;
            font-size: 1.2rem;
            font-weight: 700;
            color: white;
            background: linear-gradient(135deg, #7c3aed 0%, #db2777 100%);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            box-shadow: 0 0 30px rgba(124, 58, 237, 0.5),
                        0 0 60px rgba(219, 39, 119, 0.3);
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.8s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 0 50px rgba(124, 58, 237, 0.8),
                        0 0 100px rgba(219, 39, 119, 0.5),
                        0 20px 40px rgba(124, 58, 237, 0.4);
            border-color: rgba(255, 255, 255, 0.6);
        }

        .btn:active {
            transform: translateY(-1px) scale(0.98);
        }

        /* Decorative elements */
        .star {
            position: absolute;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            opacity: 0.6;
            animation: twinkle 3s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .title {
                font-size: 3rem;
            }

            .subtitle {
                font-size: 1rem;
            }

            .btn {
                padding: 15px 40px;
                font-size: 1rem;
            }

            .logo-img {
                width: 180px;
            }
        }

        /* Radial gradient orbs */
        .orb-1 {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(124, 58, 237, 0.5), transparent);
            top: 10%;
            right: 10%;
            animation: float 25s infinite ease-in-out;
        }

        .orb-2 {
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, rgba(219, 39, 119, 0.4), transparent);
            bottom: 15%;
            left: 10%;
            animation: float 30s infinite ease-in-out reverse;
        }

        .orb-3 {
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.3), transparent);
            top: 50%;
            right: 5%;
            animation: float 35s infinite ease-in-out;
        }
    </style>
</head>

    <!-- Background Effects -->
    <div class="particles">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        <div class="glow-orb orb-3"></div>
    </div>

    <!-- Main Content -->
    <div class="container">
        <!-- Logo Section -->
        <div class="logo-container">
            <div class="logo-glow"></div>
            <!-- UPDATE: Replace the image source with your logo path -->
            <img src="logo.jpg" alt="Jai Club Logo" class="logo-img">
        </div>

        <!-- Title -->
        <h1 class="title">Jai Club</h1>
        
        <!-- Subtitle -->
        <p class="subtitle">✨ Join The Winning Circle ✨</p>

        <!-- CTA Button -->
        <div class="btn-container">
            <a href="https://t.me/+yd9pzclRP2I3OTU9" class="btn" onclick="fbq('track', 'Lead');">
                📱 Join Telegram Channel
            </a>
        </div>
    </div>

    <script>
        // Add random stars for decoration
        function createStars() {
            const container = document.querySelector('.particles');
            for (let i = 0; i < 50; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                container.appendChild(star);
            }
        }

        createStars();

        // Track button clicks with Meta Pixel
        document.querySelector('.btn').addEventListener('click', function() {
            fbq('track', 'Lead');
        });
    </script>
</body>
</html>
